<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,#fde2f3,#e8dcff,#fff3d6);
overflow:hidden;
}

/* pastel animated background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffffff33 2px,transparent 3px);
background-size:120px 120px;
animation:moveBg 25s linear infinite;
opacity:.6;
}

@keyframes moveBg{
from{transform:translateY(0);}
to{transform:translateY(-600px);}
}

/* Birthday message box */

.messageBox{
position:absolute;
top:40px;
background:white;
padding:18px 35px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-family:"Playfair Display",serif;
font-size:23px;
color:#f48fb1;
letter-spacing:2px;
opacity:0;
transform:translateY(-20px) scale(.9);
transition:1.2s;
z-index:2;
}

/* animation when visible */

.showMessage{
opacity:1;
transform:translateY(0) scale(1);
}

/* Button */

button{
padding:18px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#f8b4d9,#d8c6ff);
color:#5a4a6f;
cursor:pointer;
font-weight:500;
letter-spacing:1px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.4s;
z-index:2;
}

button:hover{
transform:scale(1.08);
}

/* Video */

video{
display:none;
max-width:85vw;
border-radius:20px;
box-shadow:0 30px 60px rgba(0,0,0,0.4);
margin-top:80px;
opacity:0;
transform:scale(.85);
transition:1.5s;
}

.showVideo{
display:block;
opacity:1;
transform:scale(1);
}

</style>
</head>

<body>

<div class="messageBox" id="message">
Happy Birthday Devil🌷
</div>

<div class="messageBox" id="message">
Happy Birthday Devil🌷
</div>

<button id="btn">Click Me</button>

<video id="video">
<source src="birthday.mp4" type="video/mp4">
</video>

<audio id="music">
<source src="Downloade.mp3" type="audio/mpeg">
</audio>

<script>

const btn=document.getElementById("btn");
const video=document.getElementById("video");
const music=document.getElementById("music");
const message=document.getElementById("message");

btn.onclick=function(){

btn.style.display="none";

video.classList.add("showVideo");
message.classList.add("showMessage");

video.play();
music.play();

}

/* Stop music when video ends */

video.addEventListener("ended",function(){
music.pause();
music.currentTime=0;
});

</script>

</body>
</html>}

</script>

</body>
</html>
